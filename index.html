<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Requerimento - Escola Walda Miranda de Paiva</title>

    <!-- Tailwind CSS para o design -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React e Babel para funcionar direto no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        @media print {
            @page { 
                size: A4; 
                margin: 0; 
            }

            body { 
                background: white !important; 
            }

            .no-print { 
                display: none !important; 
            }

            .print-area {
                box-shadow: none !important;
                border: none !important;
                margin: 0 !important;
                padding: 1.5cm !important;
                width: 100% !important;
                max-width: none !important;
                height: 100vh;
            }

            input {
                background: transparent !important;
                color: black !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            input::placeholder {
                color: transparent !important;
            }
        }

        .official-doc-font {
            font-family: Arial, sans-serif;
        }

        .line-label-normal {
            font-size: 10pt;
            font-weight: normal;
            text-align: center;
            display: block;
            margin-top: 4px;
        }

        .line-label-14 {
            font-size: 14pt;
            font-weight: normal;
            text-align: center;
            display: block;
            margin-top: 4px;
        }

        .crest-container {
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .crest-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-row {
            display: grid;
            grid-template-columns: auto 80px auto 45px auto 95px auto 90px;
            align-items: baseline;
            column-gap: 6px;
            width: 100%;
            white-space: nowrap;
        }

        .info-label {
            font-size: 14pt;
        }
        
        .signature-block {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            width: 100%;
        }

        .date-side-wrapper {
            display: flex;
            align-items: baseline;
            gap: 6px;
            flex-shrink: 0;
            padding-top: 8px; 
        }

        .sign-line-container {
            flex-grow: 1;
            padding-top: 8px; 
        }

        .custom-line {
            border-bottom: 1px solid black;
            padding-bottom: 0px;
            min-height: 32px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-weight: bold;
            line-height: 1;
        }

        .doc-input {
            background: transparent;
            border: none;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
            color: black;
        }

        .doc-name-input {
            width: 100%;
            min-height: 32px;
            font-size: 14pt;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid black;
            padding-bottom: 0px;
            line-height: 1;
        }

        .doc-small-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid black;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
            min-height: 1.5rem;
            color: black;
            width: 100%;
        }

        .doc-sign-input {
            width: 100%;
            min-height: 32px;
            background: transparent;
            border: none;
            border-bottom: 1px solid black;
            outline: none;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
            color: black;
        }

        .date-slots-underlined {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0;
            font-weight: normal; 
            font-size: 14pt;
            min-height: 32px;
            border-bottom: 1px solid black; 
            padding-bottom: 0px; 
        }

        .date-slot-input {
            background: transparent;
            border: none;
            outline: none;
            font-family: Arial, sans-serif;
            font-size: 14pt;
            font-weight: normal;
            text-align: center;
            line-height: 1;
            color: black;
        }

        .date-slot-item {
            width: 32px;
        }

        .date-slot-year {
            width: 50px;
        }

        .date-separator {
            font-size: 1.4rem;
            line-height: 1; 
            padding: 0 2px;
        }

        .doc-name-wrapper {
            position: relative;
        }

        .suggestions-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            background: white;
            position: absolute;
            width: 100%;
            z-index: 50;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .doc-suggestions {
            top: 38px;
            left: 0;
            font-family: Inter, sans-serif;
            text-align: left;
        }

        .director-sign-img {
            max-height: 45px;
            object-fit: contain;
            margin-bottom: -15px;
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const getTodayDateParts = () => {
                const now = new Date();

                return {
                    dia: String(now.getDate()).padStart(2, '0'),
                    mes: String(now.getMonth() + 1).padStart(2, '0'),
                    ano: String(now.getFullYear())
                };
            };

            const normalizeText = (text) => {
                return text
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .toLowerCase()
                    .trim();
            };

            const today = getTodayDateParts();

            const [logo, setLogo] = useState('./brasao.png');
            const [csvData, setCsvData] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [loadStatus, setLoadStatus] = useState('idle');
            
            const [formData, setFormData] = useState({
                nomeAluno: '',
                ano: '',
                turma: '',
                turno: '',
                anoLetivo: String(new Date().getFullYear()),

                dataRequerimentoDia: today.dia,
                dataRequerimentoMes: today.mes,
                dataRequerimentoAno: today.ano,

                dataRecebidoDia: '',
                dataRecebidoMes: '',
                dataRecebidoAno: '',

                assinaturaResponsavel: '',
                recebiDocumentacao: ''
            });

            useEffect(() => {
                const autoFetchCsv = async () => {
                    setLoadStatus('loading');

                    try {
                        const response = await fetch('./CUBO.CSV');

                        if (response.ok) {
                            const text = await response.text();
                            parseCsv(text);
                            setLoadStatus('success');
                        } else {
                            setLoadStatus('error');
                        }
                    } catch (err) {
                        setLoadStatus('error');
                    }
                };

                autoFetchCsv();
            }, []);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const parseCsv = (text) => {
                const lines = text.split(/\r?\n/);
                const result = [];
                const startIdx = lines[0].toLowerCase().includes('aluno') ? 1 : 0;

                for (let i = startIdx; i < lines.length; i++) {
                    if (lines[i].trim() === "") continue;

                    const columns = lines[i].split(';');

                    if (columns.length >= 4) {
                        result.push({
                            nome: columns[0].trim().toUpperCase(),
                            ano: columns[1].trim(),
                            turma: columns[2].trim(),
                            turno: columns[3].trim()
                        });
                    }
                }

                result.sort((a, b) => {
                    return a.nome.localeCompare(b.nome, 'pt-BR');
                });

                setCsvData(result);
            };

            const handleTextChange = (e) => {
                const { name, value } = e.target;

                let newValue = value;

                if (
                    name === 'nomeAluno' ||
                    name === 'turma' ||
                    name === 'turno'
                ) {
                    newValue = value.toUpperCase();
                }

                setFormData({ 
                    ...formData, 
                    [name]: newValue 
                });

                if (name === 'nomeAluno') {
                    setSearchTerm(newValue);
                    setShowSuggestions(true);
                }
            };

            const handleDatePartChange = (e) => {
                const { name, value } = e.target;

                const maxLength = name.endsWith('Ano') ? 4 : 2;
                const onlyNumbers = value.replace(/\D/g, '').slice(0, maxLength);

                setFormData({
                    ...formData,
                    [name]: onlyNumbers
                });
            };

            const handleCsvUploadManual = (e) => {
                const file = e.target.files[0];

                if (file) {
                    const reader = new FileReader();

                    reader.onload = (event) => {
                        parseCsv(event.target.result);
                        setLoadStatus('success');
                    };

                    reader.readAsText(file);
                }
            };

            const selectStudent = (student) => {
                setFormData({
                    ...formData,
                    nomeAluno: student.nome,
                    ano: student.ano,
                    turma: student.turma,
                    turno: student.turno
                });

                setSearchTerm(student.nome);
                setShowSuggestions(false);
            };

            const handlePrint = () => {
                setShowSuggestions(false);

                setTimeout(() => {
                    window.print();
                }, 100);
            };

            const clearForm = () => {
                const todayReset = getTodayDateParts();

                setFormData({
                    nomeAluno: '',
                    ano: '',
                    turma: '',
                    turno: '',
                    anoLetivo: String(new Date().getFullYear()),

                    dataRequerimentoDia: todayReset.dia,
                    dataRequerimentoMes: todayReset.mes,
                    dataRequerimentoAno: todayReset.ano,

                    dataRecebidoDia: '',
                    dataRecebidoMes: '',
                    dataRecebidoAno: '',

                    assinaturaResponsavel: '',
                    recebiDocumentacao: ''
                });

                setSearchTerm('');
                setShowSuggestions(false);
            };

            const filteredStudents = csvData
                .filter((student) => {
                    const nome = normalizeText(student.nome);
                    const termo = normalizeText(searchTerm);

                    if (!termo) return false;

                    if (termo.length === 1) {
                        return nome.startsWith(termo);
                    }

                    return nome.startsWith(termo) || nome.includes(termo);
                })
                .sort((a, b) => {
                    const nomeA = normalizeText(a.nome);
                    const nomeB = normalizeText(b.nome);
                    const termo = normalizeText(searchTerm);

                    const aComeca = nomeA.startsWith(termo);
                    const bComeca = nomeB.startsWith(termo);

                    if (aComeca && !bComeca) return -1;
                    if (!aComeca && bComeca) return 1;

                    return a.nome.localeCompare(b.nome, 'pt-BR');
                })
                .slice(0, 15);

            const renderSuggestions = () => {
                if (!showSuggestions || !searchTerm || csvData.length === 0) {
                    return null;
                }

                return (
                    <div className="suggestions-list doc-suggestions no-print">
                        {filteredStudents.length > 0 ? (
                            filteredStudents.map((s, idx) => (
                                <div 
                                    key={idx} 
                                    className="p-3 hover:bg-blue-600 hover:text-white cursor-pointer border-b last:border-0 text-sm font-bold uppercase" 
                                    onClick={() => selectStudent(s)}
                                >
                                    {s.nome} 
                                    <span className="text-[10px] opacity-70">
                                        {' '}({s.ano} {s.turma})
                                    </span>
                                </div>
                            ))
                        ) : (
                            <div className="p-3 text-sm text-slate-500 text-center">
                                Nenhum aluno encontrado
                            </div>
                        )}
                    </div>
                );
            };

            const renderEditableDateSlots = (prefix) => {
                return (
                    <div className="date-slots-underlined">
                        <input
                            name={`${prefix}Dia`}
                            className="date-slot-input date-slot-item"
                            value={formData[`${prefix}Dia`]}
                            onChange={handleDatePartChange}
                            maxLength="2"
                            inputMode="numeric"
                        />

                        <span className="date-separator">/</span>

                        <input
                            name={`${prefix}Mes`}
                            className="date-slot-input date-slot-item"
                            value={formData[`${prefix}Mes`]}
                            onChange={handleDatePartChange}
                            maxLength="2"
                            inputMode="numeric"
                        />

                        <span className="date-separator">/</span>

                        <input
                            name={`${prefix}Ano`}
                            className="date-slot-input date-slot-year"
                            value={formData[`${prefix}Ano`]}
                            onChange={handleDatePartChange}
                            maxLength="4"
                            inputMode="numeric"
                        />
                    </div>
                );
            };

            return (
                <div className="flex flex-col lg:flex-row min-h-screen">

                    {/* Painel lateral */}
                    <div className="no-print w-full lg:w-[360px] bg-white border-r border-slate-300 p-6 shadow-xl z-10 overflow-y-auto">
                        <div className="flex items-center gap-3 mb-8 text-blue-900 border-b pb-4">
                            <i data-lucide="file-text"></i>
                            <h1 className="text-xl font-bold uppercase tracking-tight">
                                Requerimento
                            </h1>
                        </div>

                        <div className="space-y-4">
                            <div>
                                {loadStatus === 'success' ? (
                                    <div className="flex items-center gap-2 p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm font-semibold">
                                        <i data-lucide="check-circle" size="18"></i>
                                        {csvData.length} alunos carregados.
                                    </div>
                                ) : (
                                    <div className="p-3 bg-amber-50 border border-amber-200 rounded-lg text-amber-700 text-sm text-center">
                                        <p className="mb-2 font-semibold">
                                            CUBO.CSV não carregado automaticamente.
                                        </p>

                                        <label className="text-blue-600 underline cursor-pointer font-bold">
                                            Carregar CUBO.CSV manualmente
                                            <input 
                                                type="file" 
                                                className="hidden" 
                                                accept=".csv" 
                                                onChange={handleCsvUploadManual} 
                                            />
                                        </label>
                                    </div>
                                )}
                            </div>

                            <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg text-blue-900 text-sm leading-relaxed">
                                <p className="font-bold mb-1">
                                    Como preencher:
                                </p>

                                <p>
                                    Digite direto na folha. No nome do aluno, as sugestões aparecem automaticamente.
                                </p>
                            </div>

                            <button 
                                onClick={handlePrint} 
                                className="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 shadow-lg"
                            >
                                <i data-lucide="printer"></i>
                                IMPRIMIR
                            </button>

                            <button 
                                onClick={clearForm} 
                                className="w-full bg-slate-200 hover:bg-slate-300 text-slate-800 font-bold py-3 rounded-lg flex items-center justify-center gap-2"
                            >
                                <i data-lucide="eraser"></i>
                                LIMPAR FOLHA
                            </button>
                        </div>
                    </div>

                    {/* Área do Documento */}
                    <div className="flex-1 flex justify-center p-4 lg:p-10 overflow-y-auto bg-slate-200 print:bg-white print:p-0">
                        <div className="print-area bg-white w-full max-w-[21cm] min-h-[29.7cm] shadow-2xl p-[1.5cm] lg:p-[2cm] text-black official-doc-font box-border">
                            
                            {/* Cabeçalho */}
                            <div className="flex items-center justify-start gap-8 mb-8">
                                <div className="crest-container shrink-0">
                                    <img 
                                        src={logo} 
                                        alt="Brasão" 
                                        className="crest-img" 
                                        onError={(e) => { 
                                            e.target.src = 'https://via.placeholder.com/120?text=BRASÃO'; 
                                        }} 
                                    />
                                </div>

                                <div className="text-[16pt] font-bold leading-tight uppercase text-left">
                                    <p>Estado de Goiás</p>
                                    <p>Prefeitura Municipal de Formosa</p>
                                    <p>Secretaria Municipal de Educação</p>
                                </div>
                            </div>

                            <div className="text-center mb-10">
                                <h1 className="text-[26pt] font-bold italic mb-8">
                                    Requerimento de Transferência
                                </h1>

                                <h2 className="text-[13pt] font-normal uppercase tracking-widest mt-8">
                                    Escola Municipal Walda Miranda de Paiva
                                </h2>
                            </div>

                            {/* Nome do Aluno */}
                            <div className="mb-10 mt-14 doc-name-wrapper">
                                <input
                                    name="nomeAluno"
                                    className="doc-input doc-name-input uppercase"
                                    value={formData.nomeAluno}
                                    onChange={handleTextChange}
                                    onFocus={() => {
                                        if (formData.nomeAluno) {
                                            setSearchTerm(formData.nomeAluno);
                                            setShowSuggestions(true);
                                        }
                                    }}
                                    autoComplete="off"
                                />

                                {renderSuggestions()}

                                <span className="line-label-14 uppercase">
                                    Nome do Aluno
                                </span>
                            </div>

                            {/* Informações Escolares */}
                            <div className="info-row mb-14 text-[14pt]">
                                <span className="info-label">Ano:</span>

                                <input
                                    name="ano"
                                    className="doc-small-input"
                                    value={formData.ano}
                                    onChange={handleTextChange}
                                />

                                <span className="info-label">Turma:</span>

                                <input
                                    name="turma"
                                    className="doc-small-input uppercase"
                                    value={formData.turma}
                                    onChange={handleTextChange}
                                />

                                <span className="info-label">Turno:</span>

                                <input
                                    name="turno"
                                    className="doc-small-input uppercase"
                                    value={formData.turno}
                                    onChange={handleTextChange}
                                />

                                <span className="info-label">Ano Letivo:</span>

                                <input
                                    name="anoLetivo"
                                    className="doc-small-input"
                                    value={formData.anoLetivo}
                                    onChange={handleTextChange}
                                />
                            </div>

                            {/* Mensagem Central */}
                            <div className="text-center font-bold text-[18pt] mb-11 uppercase tracking-wide">
                                Requer sua Transferência
                            </div>

                            {/* Bloco de Datas e Assinaturas */}
                            <div className="space-y-16">
                                <div className="signature-block">
                                    <div className="date-side-wrapper">
                                        <span className="text-[14pt] uppercase font-normal whitespace-nowrap">
                                            Data:
                                        </span>

                                        {renderEditableDateSlots('dataRequerimento')}
                                    </div>

                                    <div className="sign-line-container">
                                        <input
                                            name="assinaturaResponsavel"
                                            className="doc-sign-input"
                                            value={formData.assinaturaResponsavel}
                                            onChange={handleTextChange}
                                        />

                                        <span className="line-label-14 uppercase">
                                            Assinatura do Aluno ou Responsável
                                        </span>
                                    </div>
                                </div>

                                <div className="signature-block">
                                    <div className="date-side-wrapper">
                                        <span className="text-[14pt] uppercase font-normal whitespace-nowrap">
                                            Data:
                                        </span>

                                        {renderEditableDateSlots('dataRecebido')}
                                    </div>

                                    <div className="sign-line-container">
                                        <input
                                            name="recebiDocumentacao"
                                            className="doc-sign-input"
                                            value={formData.recebiDocumentacao}
                                            onChange={handleTextChange}
                                        />

                                        <span className="line-label-14 uppercase">
                                            Recebi a Documentação
                                        </span>
                                    </div>
                                </div>

                                {/* Assinatura do Diretor */}
                                <div className="mt-24 text-center flex flex-col items-center">
                                    <img 
                                        src="./assinatura.png" 
                                        alt="Assinatura" 
                                        className="director-sign-img" 
                                        onError={(e) => { 
                                            e.target.style.display = 'none'; 
                                        }} 
                                    />

                                    <div className="border-b border-black w-full h-0"></div>

                                    <span className="line-label-normal uppercase text-[14pt]">
                                        Deferimento do Diretor / Secretário
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
